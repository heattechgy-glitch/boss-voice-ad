<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSS AI — The AI Director</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .scene {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.6s ease;
            padding: clamp(20px, 5vw, 60px);
            text-align: center;
        }

        .scene.active {
            opacity: 1;
        }

        /* Scene 1 - BOSS Logo */
        #scene1 .logo {
            font-size: clamp(48px, 15vw, 180px);
            font-weight: 900;
            color: #0ea5e9;
            text-shadow: 0 0 40px rgba(14, 165, 233, 0.8),
                         0 0 80px rgba(14, 165, 233, 0.4);
            animation: slam 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            letter-spacing: clamp(4px, 1vw, 16px);
        }

        @keyframes slam {
            0% {
                transform: scale(0.3) translateY(-100vh);
                opacity: 0;
            }
            60% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        #scene1 .tagline {
            font-size: clamp(16px, 3.5vw, 36px);
            font-weight: 600;
            margin-top: clamp(12px, 3vw, 32px);
            color: #ffffff;
            opacity: 0;
            animation: fadeInUp 0.6s ease 0.5s forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
            from {
                opacity: 0;
                transform: translateY(20px);
            }
        }

        /* Scene 2 - Chat Bubbles */
        #scene2 .chat-container {
            width: clamp(280px, 80vw, 600px);
            display: flex;
            flex-direction: column;
            gap: clamp(12px, 2vw, 20px);
        }

        .chat-bubble {
            padding: clamp(12px, 2.5vw, 20px) clamp(16px, 3vw, 28px);
            border-radius: clamp(16px, 3vw, 24px);
            font-size: clamp(14px, 2.5vw, 20px);
            max-width: 85%;
            opacity: 0;
            position: relative;
        }

        .user-bubble {
            background: #1e293b;
            align-self: flex-end;
            animation: slideInRight 0.5s ease forwards;
        }

        .boss-bubble {
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            align-self: flex-start;
            animation: slideInLeft 0.5s ease 0.6s forwards;
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.4);
        }

        @keyframes slideInRight {
            to {
                opacity: 1;
                transform: translateX(0);
            }
            from {
                opacity: 0;
                transform: translateX(50px);
            }
        }

        @keyframes slideInLeft {
            to {
                opacity: 1;
                transform: translateX(0);
            }
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
        }

        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 12px 20px;
            background: #1e293b;
            border-radius: 20px;
            align-self: flex-start;
            opacity: 0;
            animation: fadeIn 0.3s ease 0.3s forwards;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #0ea5e9;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        /* Scene 3 - Code Terminal */
        #scene3 .terminal {
            width: clamp(300px, 85vw, 700px);
            background: #111111;
            border: 2px solid #0ea5e9;
            border-radius: clamp(8px, 2vw, 16px);
            padding: clamp(16px, 3vw, 32px);
            box-shadow: 0 0 40px rgba(14, 165, 233, 0.3);
        }

        .code-line {
            font-family: 'Courier New', monospace;
            font-size: clamp(12px, 2vw, 16px);
            color: #22c55e;
            margin: clamp(4px, 1vw, 8px) 0;
            opacity: 0;
            animation: typeIn 0.3s ease forwards;
        }

        .code-line:nth-child(1) { animation-delay: 0.1s; }
        .code-line:nth-child(2) { animation-delay: 0.3s; }
        .code-line:nth-child(3) { animation-delay: 0.5s; }
        .code-line:nth-child(4) { animation-delay: 0.7s; }

        @keyframes typeIn {
            to {
                opacity: 1;
            }
        }

        .live-badge {
            margin-top: clamp(16px, 3vw, 32px);
            font-size: clamp(24px, 5vw, 48px);
            font-weight: 900;
            color: #22c55e;
            opacity: 0;
            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) 1.2s forwards;
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Scene 4 - Stats */
        #scene4 .stats-container {
            display: flex;
            flex-direction: column;
            gap: clamp(24px, 5vw, 48px);
            align-items: center;
        }

        .stat-box {
            text-align: center;
            opacity: 0;
            animation: fadeInScale 0.6s ease forwards;
        }

        .stat-box:nth-child(1) { animation-delay: 0.2s; }
        .stat-box:nth-child(2) { animation-delay: 0.5s; }

        @keyframes fadeInScale {
            to {
                opacity: 1;
                transform: scale(1);
            }
            from {
                opacity: 0;
                transform: scale(0.8);
            }
        }

        .stat-number {
            font-size: clamp(48px, 12vw, 120px);
            font-weight: 900;
            color: #0ea5e9;
            text-shadow: 0 0 30px rgba(14, 165, 233, 0.6);
            display: block;
        }

        .stat-label {
            font-size: clamp(16px, 3vw, 28px);
            color: #94a3b8;
            margin-top: clamp(8px, 2vw, 16px);
        }

        /* Scene 5 - CTA */
        #scene5 .cta-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(20px, 4vw, 40px);
        }

        #scene5 .cta-title {
            font-size: clamp(32px, 8vw, 72px);
            font-weight: 900;
            color: #ffffff;
            opacity: 0;
            animation: fadeInUp 0.6s ease forwards;
        }

        .cta-button {
            padding: clamp(16px, 3vw, 24px) clamp(32px, 6vw, 64px);
            font-size: clamp(20px, 4vw, 36px);
            font-weight: 700;
            color: #ffffff;
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            border: none;
            border-radius: clamp(12px, 2vw, 16px);
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 0 40px rgba(14, 165, 233, 0.6);
            opacity: 0;
            animation: pulse 1.5s ease infinite, fadeInUp 0.6s ease 0.3s forwards;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 40px rgba(14, 165, 233, 0.6);
            }
            50% {
                box-shadow: 0 0 60px rgba(14, 165, 233, 0.9);
            }
        }

        .cta-url {
            font-size: clamp(18px, 3.5vw, 28px);
            color: #64748b;
            opacity: 0;
            animation: fadeInUp 0.6s ease 0.6s forwards;
        }

        /* Progress Bar */
        .progress-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            height: 4px;
            background: #0ea5e9;
            width: 0%;
            box-shadow: 0 0 10px rgba(14, 165, 233, 0.8);
            z-index: 1000;
        }

        /* Badge */
        .ai-badge {
            position: fixed;
            top: clamp(12px, 2vw, 16px);
            right: clamp(12px, 2vw, 16px);
            background: rgba(14, 165, 233, 0.2);
            border: 1px solid #0ea5e9;
            padding: clamp(6px, 1.5vw, 10px) clamp(12px, 2.5vw, 16px);
            border-radius: clamp(6px, 1.5vw, 8px);
            font-size: clamp(10px, 1.8vw, 14px);
            font-weight: 600;
            color: #0ea5e9;
            z-index: 1000;
        }

        /* Responsive adjustments */
        @media (max-width: 640px) {
            .chat-bubble {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>

    </div>
